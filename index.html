<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VisitorPass</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  font-family: system-ui, Arial, sans-serif;
  background:#f3f4f6;
  padding:20px;
  display:flex;
  justify-content:center;
}

.app {
  background:#fff;
  max-width:420px;
  width:100%;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
  max-height:90vh;
  display:flex;
  flex-direction:column;
}

#logo {
  text-align:center;
  margin-bottom:10px;
}
#logo img {
  max-width:200px;
  width:100%;
}

h1 {
  text-align:center;
  margin-bottom:6px;
}

#dateTime {
  text-align:center;
  font-weight:600;
  margin:14px 0 20px;
}

.section {
  flex-grow:1;
}

.field {
  margin-bottom:12px;
}

input, select {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

.btn {
  width:68%;
  margin:0 auto 12px;
  padding:12px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
}

.primary { background:#22c55e; color:#fff; }
.danger { background:#ef4444; color:#fff; }
.secondary { background:#3b82f6; color:#fff; }

.error {
  color:#dc2626;
  font-weight:600;
  display:none;
}

.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup {
  background:#fff;
  padding:24px;
  border-radius:16px;
  text-align:center;
}
</style>
</head>

<body>
<div class="app">

<div id="logo">
  <img src="Gospel-Logo.png" alt="Gospel Light Christian Church">
</div>

<h1>VisitorPass</h1>
<div id="dateTime"></div>

<div id="main" class="section">
  <button class="btn primary" onclick="openSignIn()">Sign‑In</button>
  <button class="btn danger" onclick="openSignOut()">Sign‑Out</button>

  <div style="font-size:12px;text-align:center;color:#555;margin-top:30px;">
    <strong>Personal Data Protection Notice (PDPA)</strong><br>
    Information collected is for internal visitor registration only.
  </div>

  <div style="font-size:12px;text-align:center;color:#0066cc;text-decoration:underline;margin-top:12px;cursor:pointer"
       onclick="showAboutPopup()">
    About VisitorPass Visitor Management System
  </div>

  <div style="font-size:11px;text-align:center;color:#888;margin-top:10px;">
    VisitorPass v1.0
  </div>
</div>

<div id="signIn" class="section" style="display:none;">
  <div class="field"><input id="inName" placeholder="Name"></div>
  <div class="field"><input id="inHp" placeholder="Handphone (8 digits)" maxlength="8" oninput="sanitizeHp(this)"></div>
  <div class="field"><input id="inCompany" placeholder="Company"></div>
  <div class="field"><input id="inPurpose" placeholder="Purpose"></div>
  <div id="inError" class="error"></div>
  <button class="btn primary" onclick="submitSignIn()">Confirm Sign‑In</button>
  <button class="btn secondary" onclick="backToMain()">Back</button>
</div>

<div id="popup" class="overlay">
  <div class="popup">
    <h2 id="popupTitle"></h2>
    <p id="popupMsg"></p>
    <button class="btn secondary" onclick="closePopup()">OK</button>
  </div>
</div>

<script>
/* ===== ALWAYS DEFINE CLICK HANDLERS FIRST ===== */
function openSignIn(){
  main.style.display="none";
  signIn.style.display="block";
}
function openSignOut(){
  alert("Sign‑Out will be added next.");
}
function backToMain(){
  signIn.style.display="none";
  main.style.display="block";
}
function showAboutPopup(){
  showPopup(
    "About VisitorPass",
    "This application was developed for Gospel Light Christian Church.\nInternal use only."
  );
}

/* ===== UTILITIES ===== */
function sanitizeHp(input){
  input.value = input.value.replace(/\D/g,'').slice(0,8);
}
function isValidHp(hp){
  return /^\d{8}$/.test(hp);
}

/* ===== SIGN‑IN (LOCAL ONLY FOR NOW) ===== */
function submitSignIn(){
  const name=inName.value.trim();
  const hp=inHp.value.trim();
  const company=inCompany.value.trim();
  const purpose=inPurpose.value.trim();

  inError.style.display="none";

  if(!name||!hp||!company||!purpose){
    inError.textContent="❌ Please fill in all fields.";
    inError.style.display="block";
    return;
  }
  if(!isValidHp(hp)){
    inError.textContent="❌ Handphone must be 8 digits.";
    inError.style.display="block";
    return;
  }

  showPopup("✅ Sign‑In Successful",name+" signed in successfully.");
}

/* ===== POPUPS ===== */
function showPopup(t,m){
  popupTitle.textContent=t;
  popupMsg.textContent=m;
  popup.style.display="flex";
}
function closePopup(){
  popup.style.display="none";
  backToMain();
}

/* ===== CLOCK ===== */
function updateDateTime(){
  dateTime.textContent=new Date().toLocaleString();
}
updateDateTime();
setInterval(updateDateTime,1000);
</script>

</body>
</html>
