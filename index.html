<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VisitorPass</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  font-family: system-ui, Arial, sans-serif;
  background: #f3f4f6;
  padding: 20px;
  display: flex;
  justify-content: center;
}

.app {
  background: #fff;
  max-width: 420px;
  width: 100%;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,.12);
}

/* HEADER */
#logo { text-align:center; margin-bottom:10px; }
#logo img { max-width:200px; width:100%; }

h1 { text-align:center; margin-bottom:6px; }
#dateLine { text-align:center; font-weight:600; }
#timeLine { text-align:center; font-size:18px; margin-bottom:18px; }

/* SECTIONS */
.section { display:none; }
.section.active { display:block; }

.field { margin-bottom:12px; }

input, select {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* BUTTONS */
.btn {
  width:70%;
  margin:0 auto 12px;
  display:block;
  padding:12px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
}
.primary { background:#22c55e; color:#fff; }
.danger { background:#ef4444; color:#fff; }
.secondary { background:#3b82f6; color:#fff; }

/* COUNTERS */
.counter {
  text-align:center;
  font-weight:600;
  margin-bottom:6px;
}

/* POPUP */
.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}
.popup {
  background:#fff;
  padding:24px;
  border-radius:16px;
  text-align:center;
  max-width:320px;
}
</style>
</head>

<body>
<div class="app">

<div id="logo">
  <img src="Gospel-Logo.png" alt="Gospel Light">
</div>

<h1>VisitorPass</h1>
<div id="dateLine"></div>
<div id="timeLine"></div>

<!-- MAIN -->
<div id="main" class="section active">
  <button class="btn primary" onclick="openSignIn()">Sign‑In</button>
  <button class="btn danger" onclick="openSignOut()">Sign‑Out</button>

  <div style="margin-top:40px;font-size:12px;text-align:center;color:#555;line-height:1.5;">
    <strong>Personal Data Protection Notice (PDPA)</strong><br>
    Personal data is collected solely for visitor registration and security
    purposes and will be retained only as required by law.
  </div>

  <div style="margin-top:20px;font-size:12px;text-align:center;color:#0066cc;text-decoration:underline;cursor:pointer"
       onclick="showAbout()">
    About VisitorPass Visitor Management System
  </div>

  <div style="margin-top:10px;font-size:11px;text-align:center;color:#888;">
    VisitorPass v1.0
  </div>
</div>

<!-- SIGN IN -->
<div id="signIn" class="section">
  <div class="field"><input id="inName" placeholder="Name"></div>
  <div class="field">
    <input id="inHp" placeholder="Handphone (8 digits)" maxlength="8"
           oninput="sanitizeHp(this)">
  </div>

  <div class="field">
    <select id="inCompany" onchange="companyChanged()"></select>
  </div>

  <div class="field" id="newCompanyBox" style="display:none;">
    <input id="newCompany" placeholder="Enter new company name">
  </div>

  <div class="field"><input id="inPurpose" placeholder="Purpose"></div>

  <button class="btn primary" onclick="submitSignIn()">Confirm Sign‑In</button>
  <button class="btn secondary" onclick="goMain()">Back</button>
</div>

<!-- SIGN OUT -->
<div id="signOut" class="section">
  <div class="counter" id="totalToday"></div>
  <div class="counter" id="stillInside"></div>

  <div class="field">
    <input id="outHp" placeholder="Enter Handphone (8 digits)" maxlength="8"
           oninput="sanitizeHp(this)">
  </div>

  <div id="foundInfo" style="display:none;text-align:center;margin-bottom:12px;">
    <div><strong id="foundName"></strong></div>
    <div id="foundCompany"></div>
  </div>

  <button id="doSignOut" class="btn danger" style="display:none;"
          onclick="confirmSignOut()">Sign‑Out</button>
  <button class="btn secondary" onclick="goMain()">Back</button>
</div>

<!-- POPUP -->
<div id="popup" class="overlay">
  <div class="popup">
    <h2 id="popupTitle"></h2>
    <p id="popupMsg"></p>
    <button class="btn secondary" onclick="closePopup()">Back</button>
  </div>
</div>

<script>
/* ================= FLOW URLS (RAW, CORRECT) ================= */
const FLOW_A_URL =
"https://6adc8542497ee52f9948699f4ec423.8e.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/244ce5b70b2648dc8a28a6cc5170d121/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=vmFXCNCQkZKVOP1-yIyb4r4rtFIo2iZlxy3Q6gg__IY";

const FLOW_C_URL =
"https://6adc8542497ee52f9948699f4ec423.8e.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/122e6e10f233498ea9bd8100e8f89a2c/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=QZzP2YY5yl7EOysVMcNgPaRdk4P2tKmtzNk7LV4Zx6Q";

/* ================= DATA ================= */
let records = JSON.parse(localStorage.getItem("records") || "[]");
let companies = JSON.parse(localStorage.getItem("companies") || '["Gospel Light Christian Church"]');
let foundRecord = null;

/* ================= DATE / TIME ================= */
function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function updateTime() {
  const d = new Date();
  dateLine.textContent =
    d.toLocaleDateString(undefined, { weekday:"long", year:"numeric", month:"long", day:"numeric" });
  timeLine.textContent = d.toLocaleTimeString();
}
setInterval(updateTime, 1000);
updateTime();

/* ================= UTIL ================= */
function sanitizeHp(i){ i.value = i.value.replace(/\D/g,'').slice(0,8); }
function isValidHp(h){ return /^\d{8}$/.test(h); }

/* ================= NAV ================= */
function show(id){
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goMain(){ show("main"); }

/* ================= SIGN IN ================= */
function openSignIn(){
  inName.value = inHp.value = inPurpose.value = newCompany.value = "";
  newCompanyBox.style.display = "none";
  loadCompanies();
  show("signIn");
}

function loadCompanies(){
  inCompany.innerHTML = '<option value="">Select Company</option>';
  companies.forEach(c=>{
    const o = document.createElement("option");
    o.value = o.textContent = c;
    inCompany.appendChild(o);
  });
  const add = document.createElement("option");
  add.value="__NEW__";
  add.textContent="+ Add new company";
  inCompany.appendChild(add);
}

function companyChanged(){
  newCompanyBox.style.display = (inCompany.value==="__NEW__") ? "block" : "none";
}

function submitSignIn(){
  let name=inName.value.trim(),
      hp=inHp.value.trim(),
      company=inCompany.value,
      purpose=inPurpose.value.trim();

  if(company==="__NEW__"){
    company=newCompany.value.trim();
    companies.push(company);
    localStorage.setItem("companies",JSON.stringify(companies));
  }

  if(!name||!hp||!company||!purpose||!isValidHp(hp)){
    showPopup("Error","Please complete all fields correctly");
    return;
  }

  records.push({ name,hp,company,purpose,dateKey:todayKey(),outTime:"" });
  localStorage.setItem("records",JSON.stringify(records));

  fetch(FLOW_A_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      date:new Date().toLocaleDateString(),
      day:new Date().toLocaleDateString(undefined,{weekday:"long"}),
      timeIn:new Date().toLocaleTimeString(),
      name, hp, company, purpose
    })
  }).catch(()=>{});

  showPopup("Success","Signed in successfully");
}

/* ================= SIGN OUT ================= */
function openSignOut(){
  outHp.value="";
  foundInfo.style.display="none";
  doSignOut.style.display="none";
  foundRecord=null;

  totalToday.textContent="Total visitors today: "+records.filter(r=>r.dateKey===todayKey()).length;
  stillInside.textContent="Visitors still inside: "+records.filter(r=>!r.outTime).length;

  show("signOut");
}

outHp.addEventListener("input",()=>{
  if(!isValidHp(outHp.value)) return;
  const r=records.find(x=>!x.outTime && x.hp===outHp.value);
  if(!r) return;
  foundRecord=r;
  foundName.textContent=r.name;
  foundCompany.textContent=r.company;
  foundInfo.style.display="block";
  doSignOut.style.display="block";
});

function confirmSignOut(){
  if(!foundRecord) return;

  foundRecord.outTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  localStorage.setItem("records",JSON.stringify(records));

  fetch(FLOW_C_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      hp: foundRecord.hp,
      timeOut: foundRecord.outTime
    })
  }).catch(()=>{});

  showPopup("Success","Signed out successfully");
}

/* ================= POPUP ================= */
function showPopup(t,m){
  popupTitle.textContent=t;
  popupMsg.textContent=m;
  popup.style.display="flex";
}
function closePopup(){ popup.style.display="none"; goMain(); }

/* ================= ABOUT ================= */
function showAbout(){
  showPopup(
    "About VisitorPass",
    "Developed for Gospel Light Christian Church.\nInternal use only."
  );
}
</script>

</div>
</body>
</html>
