<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VisitorPass</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
  font-family:system-ui,Arial,sans-serif;
  background:#f3f4f6;
  padding:20px;
  display:flex;
  justify-content:center;
}
.app{
  background:#fff;
  max-width:420px;
  width:100%;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
}
h1{text-align:center;margin-bottom:6px}
#dateLine{text-align:center;font-weight:600}
#timeLine{text-align:center;font-size:18px;margin-bottom:18px}
.section{display:none}
.section.active{display:block}
.field{margin-bottom:12px}
input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}
.btn{
  width:70%;
  margin:0 auto 12px;
  display:block;
  padding:12px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
}
.primary{background:#22c55e;color:#fff}
.danger{background:#ef4444;color:#fff}
.secondary{background:#3b82f6;color:#fff}
.counter{text-align:center;font-weight:600;margin-bottom:6px}
.small-link{
  text-align:center;
  font-size:12px;
  color:#0066cc;
  text-decoration:underline;
  cursor:pointer;
  margin-top:10px;
}
.pdpa{
  font-size:11px;
  color:#555;
  line-height:1.5;
  margin-top:20px;
  text-align:center;
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}
.popup{
  background:#fff;
  padding:24px;
  border-radius:16px;
  text-align:center;
  max-width:320px;
}
</style>
</head>

<body>
<div class="app">

<h1>VisitorPass</h1>
<div id="dateLine"></div>
<div id="timeLine"></div>

<!-- MAIN -->
<div id="main" class="section active">
  <button class="btn primary" onclick="openSignIn()">Sign‑In</button>
  <button class="btn danger" onclick="openSignOut()">Sign‑Out</button>

  <!-- PDPA -->
  <div class="pdpa">
    <strong>Personal Data Protection Notice</strong><br>
    The personal data collected will be used solely for visitor registration,
    safety, and security purposes. Data will be retained only as long as
    necessary in accordance with applicable data protection laws.
  </div>

  <!-- ABOUT LINK -->
  <div class="small-link" onclick="showAbout()">
    About VisitorPass
  </div>
</div>

<!-- SIGN IN -->
<div id="signIn" class="section">
  <div class="field"><input id="inName" placeholder="Name"></div>
  <div class="field">
    <input id="inHp" placeholder="Handphone (8 digits)" maxlength="8"
           oninput="sanitizeHp(this)">
  </div>

  <div class="field">
    <select id="inCompany" onchange="companyChanged()"></select>
  </div>

  <div class="field" id="newCompanyBox" style="display:none;">
    <input id="newCompany" placeholder="New company">
  </div>

  <div class="field"><input id="inPurpose" placeholder="Purpose"></div>

  <button class="btn primary" onclick="submitSignIn()">Confirm Sign‑In</button>
  <button class="btn secondary" onclick="goMain()">Back</button>
</div>

<!-- SIGN OUT -->
<div id="signOut" class="section">
  <div class="counter" id="totalToday"></div>
  <div class="counter" id="stillInside"></div>

  <div class="field">
    <input id="outHp" placeholder="Enter Handphone" maxlength="8"
           oninput="sanitizeHp(this)">
  </div>

  <div id="foundInfo" style="display:none;text-align:center;margin-bottom:12px;">
    <div><strong id="foundName"></strong></div>
    <div id="foundCompany"></div>
  </div>

  <button id="doSignOut" class="btn danger" style="display:none;"
          onclick="confirmSignOut()">Sign‑Out</button>
  <button class="btn secondary" onclick="goMain()">Back</button>
</div>

<!-- POPUP -->
<div id="popup" class="overlay">
  <div class="popup">
    <h2 id="popupTitle"></h2>
    <p id="popupMsg"></p>
    <button class="btn secondary" onclick="closePopup()">Back</button>
  </div>
</div>

<script>
/* ====== FLOW URLS ====== */
const FLOW_A_URL = "YOUR_FLOW_A_URL";
const FLOW_B_URL = "YOUR_FLOW_B_URL";

/* ====== STATE ====== */
let records = JSON.parse(localStorage.getItem("records") || "[]");
let companies = JSON.parse(
  localStorage.getItem("companies") ||
  '["Gospel Light Christian Church"]'
);
let foundRecord = null;

/* ====== CLOCK ====== */
function todayKey(){return new Date().toISOString().slice(0,10);}
function updateClock(){
  const d=new Date();
  dateLine.textContent=d.toDateString();
  timeLine.textContent=d.toLocaleTimeString();
}
setInterval(updateClock,1000);updateClock();

/* ====== UTIL ====== */
function sanitizeHp(i){i.value=i.value.replace(/\D/g,'').slice(0,8);}
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goMain(){show("main");}
function showPopup(t,m){
  popupTitle.textContent=t;
  popupMsg.textContent=m;
  popup.style.display="flex";
}
function closePopup(){popup.style.display="none";}

function showAbout(){
  showPopup(
    "About VisitorPass",
    "VisitorPass is an internal visitor management system developed for\nGospel Light Christian Church.\n\nThis system is for internal use only."
  );
}

/* ====== SIGN IN ====== */
function openSignIn(){
  inName.value=inHp.value=inPurpose.value=newCompany.value="";
  newCompanyBox.style.display="none";
  loadCompanies();
  show("signIn");
}

function loadCompanies(){
  inCompany.innerHTML='<option value="">Select Company</option>';
  companies.forEach(c=>{
    const o=document.createElement("option");
    o.value=o.textContent=c;
    inCompany.appendChild(o);
  });
  const add=document.createElement("option");
  add.value="__NEW__";add.textContent="+ Add new company";
  inCompany.appendChild(add);
}

function companyChanged(){
  newCompanyBox.style.display=(inCompany.value==="__NEW__")?"block":"none";
}

function submitSignIn(){
  const record={
    name:inName.value.trim(),
    hp:inHp.value.trim(),
    company:(inCompany.value==="__NEW__"?newCompany.value.trim():inCompany.value),
    purpose:inPurpose.value.trim(),
    dateKey:todayKey(),
    outTime:""
  };

  if(!record.name||!record.hp||!record.company||!record.purpose){
    showPopup("Error","Please complete all fields.");
    return;
  }

  records.push(record);
  localStorage.setItem("records",JSON.stringify(records));

  fetch(FLOW_A_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(record)
  }).catch(()=>{});

  showPopup("Signed In",`Welcome ${record.name}`);
}

/* ====== SIGN OUT ====== */
function openSignOut(){
  outHp.value="";
  foundInfo.style.display="none";
  doSignOut.style.display="none";

  const today=todayKey();
  totalToday.textContent="Total today: "+records.filter(r=>r.dateKey===today).length;
  stillInside.textContent="Still inside: "+records.filter(r=>!r.outTime).length;

  show("signOut");
}

outHp.addEventListener("input",()=>{
  const hp=outHp.value;
  const active=records.find(r=>r.hp===hp && !r.outTime);
  const any=records.find(r=>r.hp===hp);

  if(!active && any){
    showPopup(
      "Visitor has signed out!",
      "If this is incorrect, please contact the admin."
    );
    return;
  }
  if(!active) return;

  foundRecord=active;
  foundName.textContent=active.name;
  foundCompany.textContent=active.company;
  foundInfo.style.display="block";
  doSignOut.style.display="block";
});

function confirmSignOut(){
  if(!foundRecord) return;

  const now=new Date();
  const signOutDate=now.toLocaleDateString();
  const signOutTime=now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});

  foundRecord.outTime=signOutTime;
  localStorage.setItem("records",JSON.stringify(records));

  fetch(FLOW_B_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      hp:foundRecord.hp,
      signOutDate:signOutDate,
      timeOut:signOutTime
    })
  }).catch(()=>{});

  showPopup("Signed Out",`Goodbye ${foundRecord.name}`);
}
</script>

</div>
</body>
</html>
