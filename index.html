<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VisitorPass</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  font-family: system-ui, Arial, sans-serif;
  background:#f3f4f6;
  padding:20px;
  display:flex;
  justify-content:center;
}

.app {
  background:#fff;
  max-width:420px;
  width:100%;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
  max-height:90vh;
  display:flex;
  flex-direction:column;
}

/* LOGO */
#logo {
  text-align:center;
  margin-bottom:10px;
}
#logo img {
  max-width:200px;
  width:100%;
  height:auto;
}

h1 {
  text-align:center;
  margin-bottom:6px;
}

#dateTime {
  text-align:center;
  font-weight:600;
  margin:14px 0 20px;
}

.section { flex-grow:1; overflow-y:auto; }
.field { margin-bottom:12px; }
input, select {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

.btn {
  width:68%;
  margin:0 auto 12px;
  padding:12px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
}
.primary { background:#22c55e;color:#fff }
.danger { background:#ef4444;color:#fff }
.secondary { background:#3b82f6;color:#fff }

.error {
  color:#dc2626;
  font-weight:600;
  display:none;
}

.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}
.popup {
  background:#fff;
  padding:24px;
  border-radius:16px;
  text-align:center;
}
</style>
</head>

<body>
<div class="app">

<div id="logo">
  <img src="Gospel-Logo.png" alt="Gospel Light Christian Church Logo">
</div>

<h1>VisitorPass</h1>
<div id="dateTime"></div>

<div id="main" class="section">
  <button class="btn primary" onclick="openSignIn()">Sign‑In</button>
  <button class="btn danger" onclick="openSignOut()">Sign‑Out</button>
</div>

<div id="signIn" class="section" style="display:none;">
  <input id="inName" placeholder="Name">
  <input id="inHp" placeholder="Handphone (8 digits)" maxlength="8" oninput="sanitizeHp(this)">
  <select id="inCompany" onchange="handleCompanyChange()"></select>
  <input id="newCompany" placeholder="New Company" style="display:none">
  <input id="inPurpose" placeholder="Purpose">
  <div id="inError" class="error"></div>
  <button class="btn primary" onclick="submitSignIn()">Confirm</button>
  <button class="btn secondary" onclick="backToMain()">Back</button>
</div>

<div id="popup" class="overlay">
  <div class="popup">
    <h2 id="popupTitle"></h2>
    <p id="popupMsg"></p>
    <button class="btn secondary" onclick="closePopup()">OK</button>
  </div>
</div>

<script>
const TIMEIN_API="https://6adc8542497ee52f9948699f4ec423.8e.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/244ce5b70b2648dc8a28a6cc5170d121/triggers/manual/paths/invoke?api-version=1";
const COMPANY_API="https://6adc8542497ee52f9948699f4ec423.8e.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4fecea6e48c44688beb736a94fabbdaa/triggers/manual/paths/invoke?api-version=1";
const ADDCOMPANY_API=COMPANY_API;

function updateDateTime(){
  dateTime.innerHTML=new Date().toLocaleString();
}
setInterval(updateDateTime,1000);updateDateTime();

function sanitizeHp(i){ i.value=i.value.replace(/\D/g,'').slice(0,8); }

function openSignIn(){ main.style.display="none"; signIn.style.display="block"; }
function openSignOut(){ alert("Sign‑Out later"); }
function backToMain(){ signIn.style.display="none"; main.style.display="block"; }

async function loadCompanies(){
  const res=await fetch(COMPANY_API);
  const list=await res.json();
  inCompany.innerHTML='<option value="">Select Company</option>';
  list.forEach(c=>{
    const o=document.createElement("option");
    o.value=c.Company;o.textContent=c.Company;
    inCompany.appendChild(o);
  });
  const add=document.createElement("option");
  add.value="__NEW__";add.textContent="+ Add new company";
  inCompany.appendChild(add);
}

function handleCompanyChange(){
  newCompany.style.display=inCompany.value==="__NEW__"?"block":"none";
}

async function submitSignIn(){
  let company=inCompany.value==="__NEW__"?newCompany.value.trim():inCompany.value;
  if(!company){inError.textContent="Enter company";inError.style.display="block";return;}
  await fetch(TIMEIN_API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      date:new Date().toLocaleDateString(),
      day:new Date().toLocaleDateString(undefined,{weekday:"long"}),
      timeIn:new Date().toLocaleTimeString(),
      name:inName.value,
      hp:inHp.value,
      company,
      purpose:inPurpose.value
    })
  });
  showPopup("Success","Signed in");
}

function showPopup(t,m){
  popupTitle.textContent=t;
  popupMsg.textContent=m;
  popup.style.display="flex";
}
function closePopup(){ popup.style.display="none"; backToMain(); }

loadCompanies();
</script>
</body>
</html>
